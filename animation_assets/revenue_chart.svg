  <rect x="250" y="70" width="70" height="25" rx="12" fill="#10B981" fill-opacity="0.1"/>
  <text x="285" y="87" fill="#10B981" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">+14.2%</text>

