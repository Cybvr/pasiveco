<svg width="500" height="300" viewBox="0 0 500 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="10" width="480" height="280" rx="24" fill="#111827" stroke="#1F2937" stroke-width="2"/>
  
  <text x="40" y="55" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="14" font-weight="500" text-transform="uppercase">Total Revenue</text>
