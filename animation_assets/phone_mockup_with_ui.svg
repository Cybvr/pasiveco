<svg width="340" height="680" viewBox="0 0 340 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Bezel -->
  <rect x="5" y="5" width="330" height="670" rx="46" fill="#1F2937" stroke="#374151" stroke-width="4"/>
  <rect x="12" y="12" width="316" height="656" rx="40" fill="black"/>
  
  <!-- Inner Screen Base (Pasive App Dark Mode) -->
  <rect x="16" y="16" width="308" height="648" rx="36" fill="#0B0F19"/>
  
  <!-- Dynamic Island -->
  <rect x="105" y="28" width="130" height="30" rx="15" fill="black"/>
  
  <!-- App Header -->
  <circle cx="45" cy="90" r="16" fill="url(#avatarGradient)"/>
  <text x="75" y="95" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="600">Hi, Alex 👋</text>
  <rect x="280" y="80" width="20" height="20" rx="5" fill="#1F2937"/>
  
  <!-- Balance Widget -->
  <rect x="30" y="130" width="280" height="150" rx="24" fill="url(#balanceGradient)"/>
  <text x="50" y="165" fill="#E5E7EB" font-family="system-ui, sans-serif" font-size="14">Total Balance</text>
  <text x="50" y="205" fill="white" font-family="system-ui, sans-serif" font-size="34" font-weight="700">$128,450.00</text>
  <rect x="50" y="225" width="80" height="30" rx="15" fill="white" fill-opacity="0.2"/>
  <text x="90" y="245" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">+14.2%</text>

  <!-- Action Buttons -->
  <circle cx="70" cy="330" r="25" fill="#1F2937"/>
  <text x="70" y="375" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Add</text>
  
  <circle cx="170" cy="330" r="25" fill="#1F2937"/>
  <text x="170" y="375" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Send</text>
  
  <circle cx="270" cy="330" r="25" fill="#1F2937"/>
  <text x="270" y="375" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Withdraw</text>
  
  <!-- Transactions List -->
  <text x="30" y="425" fill="white" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Recent</text>
  <text x="280" y="425" fill="#6366F1" font-family="system-ui, sans-serif" font-size="14" font-weight="500">See All</text>
  
  <!-- Item 1 -->
  <rect x="30" y="450" width="40" height="40" rx="10" fill="#10B981" fill-opacity="0.1"/>
  <text x="85" y="465" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="500">Stripe Payout</text>
  <text x="85" y="485" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="13">Today, 2:40 PM</text>
  <text x="310" y="475" fill="#10B981" font-family="system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="end">+$4,250</text>
  
  <!-- Item 2 -->
  <rect x="30" y="520" width="40" height="40" rx="10" fill="#EF4444" fill-opacity="0.1"/>
  <text x="85" y="535" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="500">Flutterwave</text>
  <text x="85" y="555" fill="#9CA3AF" font-family="system-ui, sans-serif" font-size="13">Yesterday</text>
  <text x="310" y="545" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="end">-$1,200</text>
  
  <!-- Bottom Home Bar -->
  <rect x="100" y="645" width="140" height="5" rx="2.5" fill="white"/>

  <defs>
    <linearGradient id="avatarGradient" x1="29" y1="74" x2="61" y2="106" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="balanceGradient" x1="30" y1="130" x2="310" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
  </defs>
</svg>
